<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>

        <div id="gameInfo">
            <p>Share this link to play: <span id="shareLink"></span> <button id="copyBtn">Copy</button></p>
            <p id="statusMessage">Connecting...</p>
        </div>

        <div class="scoreboard">
            <div class="score">Player X: <span id="scoreX">0</span></div>
            <div class="score">Player O: <span id="scoreO">0</span></div>
        </div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button id="replayBtn" style="display: none;">Play Again</button>
        <div style="margin-top: 20px;">
            <a href="/">Back to Home</a>
        </div>
    </div>

    <script src="client.js"></script>
</body>
</html>
